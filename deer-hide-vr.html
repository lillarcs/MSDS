<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hide the Deer – WebXR VR Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  <style>
    #ui-overlay {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: #fff;
      font-family: monospace; font-size: 22px;
      padding: 10px 24px; border-radius: 8px;
      z-index: 999; text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- ─── 2D fallback overlay (visible outside VR) ─────────────────────── -->
<div id="ui-overlay">
  <span id="phase-label">Find a hiding spot!</span> &nbsp;|&nbsp;
  <span id="timer-display">2:00</span>
</div>

<a-scene
  webxr="requiredFeatures: local-floor, bounded-floor; optionalFeatures: hand-tracking"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  shadow="type: pcfsoft"
  fog="type: exponential; color: #5a7a3a; density: 0.04"
  id="main-scene">

  <!-- ═══════════════════════════════════════════════════════════════════
       ASSETS
  ═══════════════════════════════════════════════════════════════════ -->
  <a-assets timeout="30000">
    <a-asset-item id="deer-model" src="Models/muntjac-or-tufted-deer/source/model.glb"></a-asset-item>
  </a-assets>

  <!-- ═══════════════════════════════════════════════════════════════════
       CAMERA / PLAYER RIG
  ═══════════════════════════════════════════════════════════════════ -->
  <a-entity id="player-rig" position="0 0 0">
    <a-camera id="player-camera"
      position="0 1.6 0"
      wasd-controls="enabled: true; acceleration: 5"
      look-controls="pointerLockEnabled: false">
    </a-camera>

    <!-- Left controller – shows Quest 2 model, grip-grab support -->
    <a-entity
      id="left-controller"
      oculus-touch-controls="hand: left; model: true"
      grabber="hand: left">
    </a-entity>

    <!-- Right controller – shows Quest 2 model, grip-grab support -->
    <a-entity
      id="right-controller"
      oculus-touch-controls="hand: right; model: true"
      grabber="hand: right">
    </a-entity>
  </a-entity>

  <!-- ═══════════════════════════════════════════════════════════════════
       LIGHTING  – dappled South-Asian jungle feel
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- Soft ambient: warm deep-forest green-gold -->
  <a-light type="ambient" color="#7a9e5a" intensity="0.55"></a-light>

  <!-- Main sun shaft: high-angle tropical sun, warm orange-yellow -->
  <a-light type="directional"
    color="#ffe8a0" intensity="1.1"
    position="8 18 -6"
    cast-shadow="true"
    shadow-camera-left="-20" shadow-camera-right="20"
    shadow-camera-top="20"  shadow-camera-bottom="-20"
    shadow-map-width="2048"  shadow-map-height="2048">
  </a-light>

  <!-- Fill from opposite side: cooler sky-blue bounce -->
  <a-light type="directional"
    color="#b8d4ff" intensity="0.25"
    position="-6 10 8">
  </a-light>

  <!-- Ground bounce: warm earth tone -->
  <a-light type="hemisphere"
    color="#ffe0a0" ground-color="#4a3020" intensity="0.3">
  </a-light>

  <!-- ═══════════════════════════════════════════════════════════════════
       SKY  – tropical overcast canopy glow
  ═══════════════════════════════════════════════════════════════════ -->
  <a-sky color="#6a9e4a" radius="200"></a-sky>

  <!-- ═══════════════════════════════════════════════════════════════════
       GROUND
  ═══════════════════════════════════════════════════════════════════ -->
  <a-plane id="ground"
    position="0 0 0" rotation="-90 0 0"
    width="80" height="80"
    color="#4a6b2a"
    material="roughness: 1; metalness: 0; repeat: 20 20"
    receive-shadow="true">
  </a-plane>

  <!-- Dirt path worn through center -->
  <a-plane
    position="0 0.01 0" rotation="-90 0 0"
    width="2.2" height="80"
    color="#8b6040"
    material="roughness: 1; opacity: 0.85; transparent: true"
    receive-shadow="true">
  </a-plane>

  <!-- ═══════════════════════════════════════════════════════════════════
       FOREST – trees, bamboo, undergrowth
       All positions keep center 8m clear for gameplay
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- ── Tall jungle trees ──────────────────────────────────────────── -->

  <!-- Row left -->
  <a-entity id="tree-L1" position="-5 0 -4"  jungle-tree="height:8; trunkColor:#5a3820; leafColor:#2d6a1a; leafSize:3.5"></a-entity>
  <a-entity id="tree-L2" position="-7 0 -10" jungle-tree="height:10; trunkColor:#4a3018; leafColor:#3a7a20; leafSize:4"></a-entity>
  <a-entity id="tree-L3" position="-4 0 -16" jungle-tree="height:9;  trunkColor:#5a3820; leafColor:#2d6a1a; leafSize:3.8"></a-entity>
  <a-entity id="tree-L4" position="-9 0 2"   jungle-tree="height:11; trunkColor:#4a3018; leafColor:#348020; leafSize:4.5"></a-entity>
  <a-entity id="tree-L5" position="-6 0 8"   jungle-tree="height:7;  trunkColor:#5a3820; leafColor:#2d6a1a; leafSize:3.2"></a-entity>
  <a-entity id="tree-L6" position="-11 0 -2" jungle-tree="height:12; trunkColor:#3a2510; leafColor:#3a7a20; leafSize:5"></a-entity>

  <!-- Row right -->
  <a-entity id="tree-R1" position="5 0 -4"   jungle-tree="height:9;  trunkColor:#4a3018; leafColor:#3a7a20; leafSize:4"></a-entity>
  <a-entity id="tree-R2" position="8 0 -9"   jungle-tree="height:11; trunkColor:#5a3820; leafColor:#2d6a1a; leafSize:4.5"></a-entity>
  <a-entity id="tree-R3" position="6 0 -15"  jungle-tree="height:8;  trunkColor:#4a3018; leafColor:#348020; leafSize:3.5"></a-entity>
  <a-entity id="tree-R4" position="10 0 1"   jungle-tree="height:10; trunkColor:#5a3820; leafColor:#2d6a1a; leafSize:4.2"></a-entity>
  <a-entity id="tree-R5" position="7 0 7"    jungle-tree="height:9;  trunkColor:#4a3018; leafColor:#3a7a20; leafSize:3.8"></a-entity>
  <a-entity id="tree-R6" position="12 0 -3"  jungle-tree="height:13; trunkColor:#3a2510; leafColor:#3a7a20; leafSize:5.5"></a-entity>

  <!-- Deep background trees (visual mass) -->
  <a-entity position="-3 0 -22"  jungle-tree="height:14; trunkColor:#4a3018; leafColor:#3a7a20; leafSize:6"></a-entity>
  <a-entity position="3 0 -22"   jungle-tree="height:12; trunkColor:#5a3820; leafColor:#2d6a1a; leafSize:5"></a-entity>
  <a-entity position="-14 0 -8"  jungle-tree="height:14; trunkColor:#3a2510; leafColor:#3a7a20; leafSize:6"></a-entity>
  <a-entity position="14 0 -8"   jungle-tree="height:13; trunkColor:#3a2510; leafColor:#348020; leafSize:5.5"></a-entity>
  <a-entity position="-16 0 4"   jungle-tree="height:15; trunkColor:#3a2510; leafColor:#2d6a1a; leafSize:6.5"></a-entity>
  <a-entity position="16 0 4"    jungle-tree="height:15; trunkColor:#3a2510; leafColor:#3a7a20; leafSize:6.5"></a-entity>

  <!-- ── Bamboo groves ──────────────────────────────────────────────── -->
  <a-entity id="bamboo-grove-L" bamboo-grove="count:12; spread:2.5; baseX:-8; baseZ:-6"></a-entity>
  <a-entity id="bamboo-grove-R" bamboo-grove="count:10; spread:2;   baseX:9;  baseZ:-12"></a-entity>
  <a-entity id="bamboo-grove-B" bamboo-grove="count:14; spread:3;   baseX:-2; baseZ:-20"></a-entity>

  <!-- ── Rocks ──────────────────────────────────────────────────────── -->
  <!-- Mossy boulders scattered around -->
  <a-entity id="rock-cluster-1" position="-4.5 0 -7">
    <a-sphere radius="0.7" color="#5a5a4a" material="roughness:1" position="0 0.4 0" scale="1.3 0.9 1.1" cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.45" color="#4a4a3a" material="roughness:1" position="0.8 0.25 0.3" scale="1 0.85 1.2" cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.3" color="#606050" material="roughness:1" position="-0.6 0.18 0.5" scale="1.1 0.8 0.9" cast-shadow receive-shadow></a-sphere>
  </a-entity>

  <a-entity id="rock-cluster-2" position="6.5 0 -6">
    <a-sphere radius="0.9" color="#5a5a4a" material="roughness:1" position="0 0.5 0" scale="1.2 0.9 1" cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.5" color="#4a4a3a" material="roughness:1" position="-1 0.28 0.4" scale="1 0.8 1.1" cast-shadow receive-shadow></a-sphere>
  </a-entity>

  <a-entity id="rock-cluster-3" position="-3 0 -13">
    <a-sphere radius="0.6" color="#5a5a4a" material="roughness:1" position="0 0.35 0" scale="1.4 0.8 1" cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.35" color="#606050" material="roughness:1" position="0.6 0.2 -0.4" scale="1 0.9 1.2" cast-shadow receive-shadow></a-sphere>
  </a-entity>

  <a-entity id="rock-cluster-4" position="4 0 -14">
    <a-sphere radius="0.8" color="#4a4a3a" material="roughness:1" position="0 0.45 0" scale="1.2 0.85 1" cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.4" color="#5a5a4a" material="roughness:1" position="0.9 0.23 0.3" scale="1 0.8 1" cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.25" color="#606050" material="roughness:1" position="-0.7 0.15 -0.5" cast-shadow receive-shadow></a-sphere>
  </a-entity>

  <!-- ── Fallen logs ────────────────────────────────────────────────── -->
  <a-cylinder id="log-1"
    position="-3.5 0.18 -9" rotation="0 35 90"
    radius="0.2" height="3"
    color="#6b4020" material="roughness:1"
    cast-shadow receive-shadow>
  </a-cylinder>

  <a-cylinder id="log-2"
    position="5.5 0.18 -11" rotation="0 -20 90"
    radius="0.25" height="3.5"
    color="#5a3518" material="roughness:1"
    cast-shadow receive-shadow>
  </a-cylinder>

  <a-cylinder id="log-3"
    position="-1.5 0.15 -17" rotation="0 60 90"
    radius="0.18" height="2.8"
    color="#7a5030" material="roughness:1"
    cast-shadow receive-shadow>
  </a-cylinder>

  <!-- ── Dense undergrowth / bush patches ──────────────────────────── -->
  <a-entity id="bush-L1" position="-3.8 0 -5.5" bush-patch="size:1.4; color:#1a5a10"></a-entity>
  <a-entity id="bush-L2" position="-5.5 0 -8"   bush-patch="size:1.6; color:#1a6010"></a-entity>
  <a-entity id="bush-L3" position="-2.5 0 -11"  bush-patch="size:1.2; color:#206a15"></a-entity>
  <a-entity id="bush-R1" position="4.2 0 -5.5"  bush-patch="size:1.5; color:#1a5a10"></a-entity>
  <a-entity id="bush-R2" position="6 0 -9"      bush-patch="size:1.8; color:#1a6010"></a-entity>
  <a-entity id="bush-R3" position="3.5 0 -13"   bush-patch="size:1.3; color:#206a15"></a-entity>
  <a-entity id="bush-C1" position="-1 0 -8"     bush-patch="size:1; color:#1a6010"></a-entity>

  <!-- Ferns / ground cover -->
  <a-entity id="ferns-1" ground-cover="count:20; spread:5; baseX:0;  baseZ:-8;  color:#2a7a15; size:0.4"></a-entity>
  <a-entity id="ferns-2" ground-cover="count:15; spread:4; baseX:-6; baseZ:-12; color:#227010; size:0.35"></a-entity>
  <a-entity id="ferns-3" ground-cover="count:18; spread:5; baseX:6;  baseZ:-10; color:#2a7a15; size:0.38"></a-entity>

  <!-- ── Vines hanging from trees ──────────────────────────────────── -->
  <a-entity vine="length:3; baseX:-5; baseY:7; baseZ:-4"></a-entity>
  <a-entity vine="length:4; baseX:5;  baseY:8; baseZ:-4"></a-entity>
  <a-entity vine="length:2.5; baseX:-7; baseY:9; baseZ:-10"></a-entity>
  <a-entity vine="length:3.5; baseX:8;  baseY:10; baseZ:-9"></a-entity>

  <!-- ── Fireflies (point lights that gently pulse) ─────────────────── -->
  <a-entity id="firefly-1" position="-3 1.2 -6"  firefly></a-entity>
  <a-entity id="firefly-2" position="4  1.5 -8"  firefly></a-entity>
  <a-entity id="firefly-3" position="-1 1.8 -12" firefly></a-entity>

  <!-- ═══════════════════════════════════════════════════════════════════
       IN-WORLD UI  (rendered as A-Frame geometry, visible in headset)
  ═══════════════════════════════════════════════════════════════════ -->

  <!-- Timer panel floating above the path near the player -->
  <a-entity id="timer-panel" position="0 2.4 -2.5">
    <!-- Background slab -->
    <a-plane width="1.4" height="0.35" color="#1a2a0a" material="opacity:0.75; transparent:true"></a-plane>
    <!-- Timer text -->
    <a-text id="vr-timer"
      value="2:00" align="center"
      color="#ffe080" width="3.5"
      position="0 0.04 0.01">
    </a-text>
    <!-- Phase text -->
    <a-text id="vr-phase"
      value="HIDE THE DEER!" align="center"
      color="#aaffaa" width="3" font="monoid"
      position="0 -0.1 0.01">
    </a-text>
  </a-entity>

  <!-- ═══════════════════════════════════════════════════════════════════
       TUFTED DEER  – grabbable with Quest 2 controllers
       Placed 1.5 m in front of the player on the dirt path.
       Scale may need tweaking once you see the model in headset.
  ═══════════════════════════════════════════════════════════════════ -->
  <a-entity
    id="the-deer"
    class="grabbable"
    gltf-model="#deer-model"
    position="0 0 -1.5"
    scale="0.8 0.8 0.8"
    rotation="0 180 0"
    cast-shadow="true"
    deer-idle>

    <!-- Soft warm highlight so the player can see it's interactive -->
    <a-light type="point" color="#ffe8c0" intensity="0.6" distance="1.8"></a-light>

    <!-- Grab hint label (fades when grabbed) -->
    <a-text
      id="deer-hint"
      value="Hold GRIP to carry"
      align="center"
      color="#ffffff"
      width="2.2"
      position="0 1.4 0"
      rotation="0 0 0"
      look-at="#player-camera">
    </a-text>
  </a-entity>

</a-scene>

<!-- ═══════════════════════════════════════════════════════════════════
     COMPONENTS & GAME LOGIC
═══════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── Utility ─────────────────────────────────────────────────────────── */
function rnd(min, max) { return min + Math.random() * (max - min); }

/* ════════════════════════════════════════════════════════════════════════
   JUNGLE TREE COMPONENT
   A procedural tree: trunk + multiple leaf clusters
════════════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('jungle-tree', {
  schema: {
    height:     { type: 'number', default: 8 },
    trunkColor: { type: 'color',  default: '#5a3820' },
    leafColor:  { type: 'color',  default: '#2d6a1a' },
    leafSize:   { type: 'number', default: 3.5 }
  },
  init() {
    const d = this.data;
    const el = this.el;
    const trunkH = d.height;
    const trunkR = rnd(0.18, 0.28);

    // Trunk
    const trunk = document.createElement('a-cylinder');
    trunk.setAttribute('radius', trunkR);
    trunk.setAttribute('height', trunkH);
    trunk.setAttribute('position', `0 ${trunkH / 2} 0`);
    trunk.setAttribute('color', d.trunkColor);
    trunk.setAttribute('material', 'roughness:1; metalness:0');
    trunk.setAttribute('cast-shadow', '');
    trunk.setAttribute('receive-shadow', '');
    el.appendChild(trunk);

    // Main canopy sphere
    const mainLeaf = document.createElement('a-sphere');
    mainLeaf.setAttribute('radius', d.leafSize);
    mainLeaf.setAttribute('position', `0 ${trunkH + d.leafSize * 0.6} 0`);
    mainLeaf.setAttribute('color', d.leafColor);
    mainLeaf.setAttribute('material', `roughness:1; metalness:0`);
    mainLeaf.setAttribute('cast-shadow', '');
    el.appendChild(mainLeaf);

    // Secondary canopy blobs for irregular silhouette
    const offsets = [
      [rnd(-1.2,1.2), rnd(-0.5,0.5), rnd(-1.2,1.2)],
      [rnd(-1.5,1.5), rnd(-0.8,0.2), rnd(-1.5,1.5)],
      [rnd(-1,1),     rnd(0.2,0.8),  rnd(-1,1)],
    ];
    offsets.forEach(([ox, oy, oz]) => {
      const leaf = document.createElement('a-sphere');
      const sz = d.leafSize * rnd(0.55, 0.8);
      leaf.setAttribute('radius', sz);
      leaf.setAttribute('position',
        `${ox} ${trunkH + d.leafSize * 0.6 + oy} ${oz}`);
      // Slight color variation
      const g = parseInt(d.leafColor.slice(3,5), 16);
      const variant = `#${d.leafColor.slice(1,3)}${Math.min(255,g+rnd(-20,20)|0).toString(16).padStart(2,'0')}${d.leafColor.slice(5,7)}`;
      leaf.setAttribute('color', d.leafColor);
      leaf.setAttribute('material', 'roughness:1; metalness:0');
      leaf.setAttribute('cast-shadow', '');
      el.appendChild(leaf);
    });
  }
});

/* ════════════════════════════════════════════════════════════════════════
   BAMBOO GROVE COMPONENT
════════════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('bamboo-grove', {
  schema: {
    count:  { type: 'number', default: 10 },
    spread: { type: 'number', default: 2 },
    baseX:  { type: 'number', default: 0 },
    baseZ:  { type: 'number', default: 0 }
  },
  init() {
    const { count, spread, baseX, baseZ } = this.data;
    for (let i = 0; i < count; i++) {
      const x = baseX + rnd(-spread, spread);
      const z = baseZ + rnd(-spread, spread);
      const h = rnd(5, 9);
      const r = rnd(0.04, 0.07);
      const tilt = rnd(-4, 4);

      const stalk = document.createElement('a-cylinder');
      stalk.setAttribute('radius', r);
      stalk.setAttribute('height', h);
      stalk.setAttribute('position', `${x} ${h/2} ${z}`);
      stalk.setAttribute('rotation', `${tilt} ${rnd(0,360)} 0`);
      stalk.setAttribute('color', '#7aaa30');
      stalk.setAttribute('material', 'roughness:0.8; metalness:0');
      stalk.setAttribute('cast-shadow', '');
      this.el.sceneEl.appendChild(stalk);

      // Nodes (rings on bamboo)
      for (let j = 1; j < Math.floor(h); j++) {
        const node = document.createElement('a-torus');
        node.setAttribute('radius', r * 1.4);
        node.setAttribute('radius-tubular', r * 0.3);
        node.setAttribute('position', `${x} ${j} ${z}`);
        node.setAttribute('rotation', `${tilt} 0 0`);
        node.setAttribute('color', '#5a8820');
        node.setAttribute('material', 'roughness:0.9');
        this.el.sceneEl.appendChild(node);
      }

      // Leaf tufts at top
      const leaf = document.createElement('a-sphere');
      leaf.setAttribute('radius', rnd(0.3, 0.5));
      leaf.setAttribute('position', `${x + rnd(-0.3,0.3)} ${h + 0.2} ${z + rnd(-0.3,0.3)}`);
      leaf.setAttribute('scale', `${rnd(2,3)} ${rnd(0.3,0.5)} ${rnd(2,3)}`);
      leaf.setAttribute('color', '#4a9a20');
      leaf.setAttribute('material', 'roughness:1');
      this.el.sceneEl.appendChild(leaf);
    }
  }
});

/* ════════════════════════════════════════════════════════════════════════
   BUSH PATCH COMPONENT
════════════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('bush-patch', {
  schema: {
    size:  { type: 'number', default: 1.2 },
    color: { type: 'color',  default: '#1a6010' }
  },
  init() {
    const { size, color } = this.data;
    const count = Math.floor(rnd(4, 7));
    for (let i = 0; i < count; i++) {
      const blob = document.createElement('a-sphere');
      const r = size * rnd(0.35, 0.65);
      const ox = rnd(-size * 0.5, size * 0.5);
      const oz = rnd(-size * 0.5, size * 0.5);
      const oy = r * rnd(0.4, 0.7);
      blob.setAttribute('radius', r);
      blob.setAttribute('position', `${ox} ${oy} ${oz}`);
      blob.setAttribute('color', color);
      blob.setAttribute('material', 'roughness:1; metalness:0');
      blob.setAttribute('cast-shadow', '');
      blob.setAttribute('receive-shadow', '');
      this.el.appendChild(blob);
    }
  }
});

/* ════════════════════════════════════════════════════════════════════════
   GROUND COVER / FERNS
════════════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('ground-cover', {
  schema: {
    count:  { type: 'number', default: 15 },
    spread: { type: 'number', default: 4 },
    baseX:  { type: 'number', default: 0 },
    baseZ:  { type: 'number', default: 0 },
    color:  { type: 'color',  default: '#2a7a15' },
    size:   { type: 'number', default: 0.4 }
  },
  init() {
    const { count, spread, baseX, baseZ, color, size } = this.data;
    for (let i = 0; i < count; i++) {
      const x = baseX + rnd(-spread, spread);
      const z = baseZ + rnd(-spread, spread);
      // Cross-billboard fern: two quads crossing at 90°
      [0, 90].forEach(ry => {
        const frond = document.createElement('a-plane');
        frond.setAttribute('width',  size * rnd(0.8, 1.4));
        frond.setAttribute('height', size * rnd(0.8, 1.3));
        frond.setAttribute('position', `${x} ${size * 0.4} ${z}`);
        frond.setAttribute('rotation', `0 ${ry + rnd(-20, 20)} 0`);
        frond.setAttribute('color', color);
        frond.setAttribute('material', 'side:double; roughness:1; metalness:0');
        this.el.sceneEl.appendChild(frond);
      });
    }
  }
});

/* ════════════════════════════════════════════════════════════════════════
   VINE COMPONENT
════════════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('vine', {
  schema: {
    length: { type: 'number', default: 3 },
    baseX:  { type: 'number', default: 0 },
    baseY:  { type: 'number', default: 7 },
    baseZ:  { type: 'number', default: 0 }
  },
  init() {
    const { length, baseX, baseY, baseZ } = this.data;
    const segments = Math.floor(length / 0.4);
    for (let i = 0; i < segments; i++) {
      const seg = document.createElement('a-cylinder');
      seg.setAttribute('radius', 0.025);
      seg.setAttribute('height', 0.4);
      seg.setAttribute('position', `${baseX + rnd(-0.05,0.05)} ${baseY - i * 0.4} ${baseZ + rnd(-0.05,0.05)}`);
      seg.setAttribute('color', '#3a6a10');
      seg.setAttribute('material', 'roughness:1');
      this.el.sceneEl.appendChild(seg);

      // Occasional leaf
      if (i % 3 === 0) {
        const leaf = document.createElement('a-plane');
        leaf.setAttribute('width', 0.25);
        leaf.setAttribute('height', 0.18);
        leaf.setAttribute('position', `${baseX + rnd(-0.15,0.15)} ${baseY - i * 0.4} ${baseZ + rnd(-0.15,0.15)}`);
        leaf.setAttribute('rotation', `${rnd(-30,30)} ${rnd(0,360)} ${rnd(-20,20)}`);
        leaf.setAttribute('color', '#4a8a20');
        leaf.setAttribute('material', 'side:double; roughness:1');
        this.el.sceneEl.appendChild(leaf);
      }
    }
  }
});

/* ════════════════════════════════════════════════════════════════════════
   FIREFLY COMPONENT  – small glowing light that floats gently
════════════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('firefly', {
  init() {
    // Tiny glowing dot
    const dot = document.createElement('a-sphere');
    dot.setAttribute('radius', 0.035);
    dot.setAttribute('color', '#eeffaa');
    dot.setAttribute('material', 'emissive:#ccff88; emissiveIntensity:1.5');
    this.el.appendChild(dot);

    // Point light
    const light = document.createElement('a-light');
    light.setAttribute('type', 'point');
    light.setAttribute('color', '#ccff88');
    light.setAttribute('intensity', 0.3);
    light.setAttribute('distance', 2.5);
    this.el.appendChild(light);

    // Floating animation params
    this._t = Math.random() * Math.PI * 2;
    this._origin = { ...this.el.object3D.position };
    this._speed  = rnd(0.4, 0.9);
    this._radius = rnd(0.15, 0.35);
  },
  tick(time) {
    this._t += 0.008 * this._speed;
    const t = this._t;
    const pos = this.el.getAttribute('position');
    const ox = parseFloat(this.el.getAttribute('position').x) || 0;
    this.el.object3D.position.x += Math.sin(t * 1.3) * 0.003;
    this.el.object3D.position.y += Math.sin(t) * 0.004;
    this.el.object3D.position.z += Math.cos(t * 0.9) * 0.003;
  }
});

/* ════════════════════════════════════════════════════════════════════════
   GAME TIMER (Phase 1 – counting down 120 s)
════════════════════════════════════════════════════════════════════════ */
const HIDE_DURATION = 120; // seconds

const GameState = {
  phase: 'hide',    // 'hide' | 'wait' | 'leopard' | 'result'
  timeLeft: HIDE_DURATION,
  lastTick: null,
  deerPosition: { x: 0, y: 0, z: -1.5 }   // updated each time deer is released
};

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function updateTimerUI(seconds) {
  const html  = document.getElementById('timer-display');
  const vrEl  = document.getElementById('vr-timer');
  const str   = formatTime(seconds);
  if (html)  html.textContent = str;
  if (vrEl)  vrEl.setAttribute('value', str);
}

function setPhaseLabel(text) {
  const html = document.getElementById('phase-label');
  const vr   = document.getElementById('vr-phase');
  if (html) html.textContent = text;
  if (vr)   vr.setAttribute('value', text);
}

// Tick every second using A-Frame scene tick
AFRAME.registerComponent('game-manager', {
  init() {
    this._lastSec = null;
    GameState.lastTick = performance.now();
  },
  tick(time) {
    if (GameState.phase !== 'hide') return;

    const nowSec = Math.floor(time / 1000);
    if (this._lastSec === nowSec) return;
    this._lastSec = nowSec;

    const elapsed = Math.floor(time / 1000);
    const remaining = Math.max(0, HIDE_DURATION - elapsed);
    GameState.timeLeft = remaining;
    updateTimerUI(remaining);

    if (remaining <= 10 && remaining > 0) {
      // Flash timer red when near end
      const vrTimer = document.getElementById('vr-timer');
      if (vrTimer) vrTimer.setAttribute('color', remaining % 2 === 0 ? '#ff4444' : '#ffe080');
    }

    if (remaining === 0) {
      GameState.phase = 'leopard';
      setPhaseLabel('The leopard is hunting...');
      updateTimerUI(0);
      // Leopard logic will be added in the next step
      console.log('[Game] Timer expired – leopard phase begins');
    }
  }
});

// Attach game-manager to scene
document.querySelector('a-scene').setAttribute('game-manager', '');

/* ════════════════════════════════════════════════════════════════════════
   DEER IDLE ANIMATION
   Gentle breathing (scale pulse) + slow left-right head sway.
   Uses THREE.js directly so it works without a separate animation lib.
════════════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('deer-idle', {
  init() {
    this._t = 0;
    this._baseScale = null;  // captured after model loads
    this._grabbed   = false;

    this.el.addEventListener('model-loaded', () => {
      this._baseScale = this.el.object3D.scale.clone();
    });
  },
  setGrabbed(v) { this._grabbed = v; },
  tick(time, dt) {
    if (this._grabbed || !this._baseScale) return;
    this._t += dt * 0.001;           // convert ms → seconds
    const t = this._t;

    // Breathing: gentle ±1.5% scale pulse at ~0.3 Hz
    const breathe = 1 + Math.sin(t * 1.9) * 0.015;
    this.el.object3D.scale.set(
      this._baseScale.x * breathe,
      this._baseScale.y * breathe,
      this._baseScale.z * breathe
    );

    // Subtle head-bob in Y (±1 cm at ~0.2 Hz)
    this.el.object3D.position.y = Math.sin(t * 1.2) * 0.01;
  }
});

/* ════════════════════════════════════════════════════════════════════════
   GRABBER COMPONENT
   Attach to each controller. Listens for gripdown / gripup (Quest 2
   grip button). When grip is pressed and the deer is within reach,
   parents the deer to this controller so it follows the hand.
   On release it unparents and snaps the deer to the floor.

   Grab radius: 0.7 m  (close enough to feel physical, forgiving enough
   to work with the model's bounding box).
════════════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('grabber', {
  schema: { hand: { type: 'string', default: 'right' } },

  init() {
    this._holding     = null;   // currently held entity
    this._prevParent  = null;   // original parent to restore on release
    this._grabOffset  = new THREE.Vector3();
    this._grabQuat    = new THREE.Quaternion();
    this._worldPos    = new THREE.Vector3();

    // Quest 2 grip button events
    this.el.addEventListener('gripdown',   this._onGripDown.bind(this));
    this.el.addEventListener('gripup',     this._onGripUp.bind(this));

    // Also support trigger for desktop testing
    this.el.addEventListener('triggerdown', this._onGripDown.bind(this));
    this.el.addEventListener('triggerup',   this._onGripUp.bind(this));
  },

  _onGripDown() {
    if (GameState.phase !== 'hide') return;
    if (this._holding) return;               // already holding something

    const deer = document.getElementById('the-deer');
    if (!deer) return;

    // Distance check in world space
    const ctrlPos = new THREE.Vector3();
    const deerPos = new THREE.Vector3();
    this.el.object3D.getWorldPosition(ctrlPos);
    deer.object3D.getWorldPosition(deerPos);

    if (ctrlPos.distanceTo(deerPos) > 0.9) return;  // too far

    // ── Grab! ────────────────────────────────────────────────────────
    this._holding = deer;

    // Hide the hint label
    const hint = document.getElementById('deer-hint');
    if (hint) hint.setAttribute('visible', false);

    // Tell the idle component to stop animating while held
    if (deer.components['deer-idle']) deer.components['deer-idle'].setGrabbed(true);

    // Compute offset so the deer doesn't snap to controller origin
    const ctrlWorldInv = new THREE.Matrix4();
    this.el.object3D.updateMatrixWorld();
    ctrlWorldInv.copy(this.el.object3D.matrixWorld).invert();

    deer.object3D.getWorldPosition(deerPos);
    this._grabOffset.copy(deerPos).applyMatrix4(ctrlWorldInv);

    // Reparent deer → controller
    this._prevParent = deer.parentNode;
    this.el.appendChild(deer);

    // Apply local offset so it stays in place visually
    deer.object3D.position.copy(this._grabOffset);

    console.log(`[Grabber] ${this.data.hand} grabbed the deer`);
  },

  _onGripUp() {
    if (!this._holding) return;
    const deer = this._holding;
    this._holding = null;

    // Get deer world position before reparenting
    const worldPos = new THREE.Vector3();
    deer.object3D.getWorldPosition(worldPos);

    const worldQuat = new THREE.Quaternion();
    deer.object3D.getWorldQuaternion(worldQuat);

    // Restore to scene root
    const scene = document.querySelector('a-scene');
    if (this._prevParent && this._prevParent !== scene) {
      this._prevParent.appendChild(deer);
    } else {
      scene.appendChild(deer);
    }

    // Snap Y to ground (floor = y 0), keep XZ from world pos
    worldPos.y = 0;
    deer.setAttribute('position', {
      x: worldPos.x,
      y: worldPos.y,
      z: worldPos.z
    });

    // Restore world rotation
    deer.object3D.quaternion.copy(worldQuat);

    // Resume idle animation
    if (deer.components['deer-idle']) deer.components['deer-idle'].setGrabbed(false);

    // Show hint again (so player knows they can grab again)
    const hint = document.getElementById('deer-hint');
    if (hint) hint.setAttribute('visible', true);

    // Record final deer position for the leopard phase
    GameState.deerPosition = { x: worldPos.x, y: 0, z: worldPos.z };
    console.log(`[Grabber] ${this.data.hand} released deer at`, GameState.deerPosition);
  }
});

</script>
