<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deer POV</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a2a10; }
  canvas { display: block; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2a10);
scene.fog = new THREE.Fog(0x1a2a10, 10, 80);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.0, 0); // deer eye height ~1m

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lighting
const ambient = new THREE.AmbientLight(0x405030, 1.2);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffe8a0, 2.0);
sun.position.set(20, 40, 10);
sun.castShadow = true;
scene.add(sun);

// Ground
const groundGeo = new THREE.PlaneGeometry(200, 200, 40, 40);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a5a1a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Trees
function makeTree(x, z) {
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.18, 2.0, 7),
    new THREE.MeshLambertMaterial({ color: 0x5a3a1a })
  );
  trunk.position.set(x, 1.0, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const foliageMat = new THREE.MeshLambertMaterial({ color: 0x2d5a1a });
  const heights = [0, 0.7, 1.3];
  const scales = [1.0, 0.75, 0.5];
  heights.forEach((h, i) => {
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(1.1 * scales[i], 1.8 * scales[i], 7),
      foliageMat
    );
    cone.position.set(x, 2.2 + h, z);
    cone.castShadow = true;
    scene.add(cone);
  });
}

for (let i = 0; i < 60; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 5 + Math.random() * 35;
  makeTree(Math.cos(angle) * dist, Math.sin(angle) * dist);
}

// Grass tufts
const grassMat = new THREE.MeshLambertMaterial({ color: 0x4a7a20, side: THREE.DoubleSide });
for (let i = 0; i < 200; i++) {
  const blade = new THREE.Mesh(
    new THREE.PlaneGeometry(0.3, 0.4),
    grassMat
  );
  blade.position.set((Math.random() - 0.5) * 40, 0.2, (Math.random() - 0.5) * 40);
  blade.rotation.y = Math.random() * Math.PI;
  scene.add(blade);
}

// Simple deer-walk bob
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.012;
  // Gentle head-bob as if slowly grazing/walking
  camera.position.y = 1.0 + Math.sin(t * 2) * 0.04;
  camera.position.x = Math.sin(t * 0.3) * 0.5;
  camera.position.z = Math.cos(t * 0.3) * 0.5;
  camera.lookAt(
    Math.sin(t * 0.3 + 0.1) * 2,
    0.9 + Math.sin(t * 2 + 0.2) * 0.04,
    Math.cos(t * 0.3 + 0.1) * 2
  );
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
