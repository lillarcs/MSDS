<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hide the Deer – WebXR VR Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: #080906; }
    #ui-overlay {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.82); color: #ccc;
      font-family: monospace; font-size: 17px;
      padding: 8px 20px; border-radius: 6px;
      z-index: 999; text-align: center; pointer-events: none;
    }
    #ui-overlay.urgent { color: #ff5533; }
  </style>
</head>
<body>

<div id="ui-overlay">
  <span id="phase-label">Find a hiding spot!</span>&nbsp;|&nbsp;<span id="timer-display">2:00</span>
</div>

<a-scene
  webxr="requiredFeatures: local-floor, bounded-floor; optionalFeatures: hand-tracking"
  renderer="antialias: true; colorManagement: true; physicallyCorrectLights: true"
  shadow="type: pcfsoft"
  fog="type: exponential; color: #4a6a38; density: 0.022"
  id="main-scene">

  <!-- ═══ ASSETS ═══ -->
  <!-- Deer is built procedurally (no external textures) -->
  <!-- Leopard is a self-contained GLB with no external texture files -->
  <a-assets timeout="30000">
    <a-asset-item id="leopard-model" src="Models/leopard_main.glb"></a-asset-item>
  </a-assets>

  <!-- ═══ PLAYER RIG ═══ -->
  <a-entity id="player-rig" position="0 0 0">
    <a-camera id="player-camera" position="0 1.6 0"
      wasd-controls="enabled: true; acceleration: 5"
      look-controls="pointerLockEnabled: false">
      <a-cursor id="cursor" color="#ffee88" opacity="0.8"
        raycaster="objects: .clickable; far: 8">
      </a-cursor>
    </a-camera>
    <a-entity id="left-controller"
      oculus-touch-controls="hand: left; model: false"
      grabber="hand: left">
      <!-- Simple hand indicator — no external model needed -->
      <a-sphere radius="0.04" color="#ffccaa" material="emissive:#885533; emissiveIntensity:0.4"></a-sphere>
    </a-entity>
    <a-entity id="right-controller"
      oculus-touch-controls="hand: right; model: false"
      grabber="hand: right">
      <a-sphere radius="0.04" color="#ffccaa" material="emissive:#885533; emissiveIntensity:0.4"></a-sphere>
    </a-entity>
  </a-entity>

  <!-- ═══ LIGHTING — dim canopy-filtered jungle ═══ -->
  <a-light id="ambient-light" type="ambient" color="#88aa66" intensity="1.1"></a-light>
  <!-- Main sun shaft through canopy -->
  <a-light type="directional" color="#ffe8b0" intensity="1.6"
    position="5 14 -8"
    cast-shadow="true"
    shadow-camera-left="-20" shadow-camera-right="20"
    shadow-camera-top="20"   shadow-camera-bottom="-20"
    shadow-map-width="1024"  shadow-map-height="1024">
  </a-light>
  <!-- Sky fill -->
  <a-light type="directional" color="#80a0c0" intensity="0.5" position="-7 7 4"></a-light>

  <!-- ═══ SKY — impenetrable dark canopy ═══ -->
  <a-sky color="#5a8040" radius="150"></a-sky>

  <!-- ═══ GROUND — dark soil ═══ -->
  <a-plane id="ground" rotation="-90 0 0" width="80" height="80"
    color="#2a1e0c" material="roughness:1; metalness:0" receive-shadow="true">
  </a-plane>
  <!-- Leaf litter patches -->
  <a-plane position="-2  0.004 -7"  rotation="-90 25 0"  width="4"   height="3"   color="#1a1206" material="opacity:0.65; transparent:true"></a-plane>
  <a-plane position="3   0.004 -12" rotation="-90 -15 0" width="3"   height="2.5" color="#1d1308" material="opacity:0.55; transparent:true"></a-plane>
  <a-plane position="-5  0.004 -5"  rotation="-90 40 0"  width="3.5" height="2.5" color="#181004" material="opacity:0.60; transparent:true"></a-plane>
  <a-plane position="1   0.004 -17" rotation="-90 -30 0" width="4"   height="3"   color="#1a1206" material="opacity:0.55; transparent:true"></a-plane>
  <a-plane position="-8  0.004 -16" rotation="-90 10 0"  width="3"   height="4"   color="#181004" material="opacity:0.65; transparent:true"></a-plane>
  <a-plane position="5   0.004 -20" rotation="-90 -20 0" width="3.5" height="2.5" color="#1a1206" material="opacity:0.5;  transparent:true"></a-plane>

  <!-- ═══════════════════════════════════════════════════════════
       EDUCATIONAL INTRO PANEL
  ═══════════════════════════════════════════════════════════════ -->
  <a-entity id="intro-panel" position="0 1.6 -0.9" scale="0.2 0.2 0.2" intro-panel>
    <a-plane width="1.96" height="1.1"  color="#443318" material="opacity:0.45; transparent:true" position="0 0 -0.006"></a-plane>
    <a-plane width="1.88" height="1.04" color="#0a0c08" material="opacity:0.93; transparent:true"></a-plane>
    <a-text
      value="TUFTED DEER — SURVIVAL BY HIDING&#10;&#10;Tufted deer do not outrun leopards.&#10;They vanish into the forest.&#10;&#10;Their dark chocolate coat blends&#10;into dense shadow, tangled shrubs&#10;and riparian undergrowth.&#10;&#10;You have 2 minutes.&#10;Choose your hiding spot wisely."
      align="center" color="#c0a85a" width="3.3"
      position="0 0.02 0.01" wrap-count="30" baseline="center">
    </a-text>
  </a-entity>

  <!-- ═══ TIMER PANEL (world-space) ═══ -->
  <a-entity id="timer-panel" position="0 2.6 -2.5">
    <a-plane width="1.55" height="0.40" color="#070d05" material="opacity:0.88; transparent:true"></a-plane>
    <a-text id="vr-timer" value="2:00" align="center" color="#ffe080" width="3.9" position="0  0.055 0.01"></a-text>
    <a-text id="vr-phase" value="HIDE THE DEER!"  align="center" color="#80cc80" width="3.3" position="0 -0.105 0.01"></a-text>
  </a-entity>

  <!-- ═══ RESULT PANEL (hidden until game end) ═══ -->
  <a-entity id="result-panel" position="0 1.7 -2" visible="false">
    <a-plane id="result-bg" width="2.5" height="0.95" color="#070d05" material="opacity:0.93; transparent:true"></a-plane>
    <a-text id="result-text" value="" align="center" color="#ffffff" width="4.2"
      position="0 0 0.01" wrap-count="33" baseline="center">
    </a-text>
  </a-entity>

  <!-- ═══════════════════════════════════════════════════════════
       TREES — LARGE CANOPY  (height 10-16)  ~20 trees
  ═══════════════════════════════════════════════════════════════ -->
  <!-- Cluster directly above Spot 1 — deep shadow corner (left) -->
  <a-entity position="-6  0 -11" jungle-tree="height:12; trunkColor:#1c1008; leafColor:#0e1c08; leafSize:5"></a-entity>
  <a-entity position="-10 0 -12" jungle-tree="height:14; trunkColor:#160c06; leafColor:#0a1606; leafSize:6"></a-entity>
  <a-entity position="-8  0 -16" jungle-tree="height:13; trunkColor:#1c1008; leafColor:#0e1c08; leafSize:5.5"></a-entity>
  <a-entity position="-5  0 -14" jungle-tree="height:11; trunkColor:#181008; leafColor:#0c1a07; leafSize:4.5"></a-entity>
  <a-entity position="-12 0 -14" jungle-tree="height:15; trunkColor:#120a04; leafColor:#081406; leafSize:6.5"></a-entity>
  <!-- Left flank deep forest -->
  <a-entity position="-12 0 -5"  jungle-tree="height:13; trunkColor:#1c1008; leafColor:#0e1c08; leafSize:5.5"></a-entity>
  <a-entity position="-15 0 -10" jungle-tree="height:14; trunkColor:#160c06; leafColor:#0a1606; leafSize:6"></a-entity>
  <a-entity position="-16 0 -18" jungle-tree="height:12; trunkColor:#1c1008; leafColor:#0e1c08; leafSize:5"></a-entity>
  <a-entity position="-13 0 -22" jungle-tree="height:15; trunkColor:#120a04; leafColor:#081406; leafSize:6.5"></a-entity>
  <!-- Right flank (near rocky gully Spot 3) -->
  <a-entity position="10  0 -8"  jungle-tree="height:12; trunkColor:#1c1008; leafColor:#0e1c08; leafSize:5"></a-entity>
  <a-entity position="13  0 -12" jungle-tree="height:14; trunkColor:#181008; leafColor:#0c1a07; leafSize:5.5"></a-entity>
  <a-entity position="11  0 -18" jungle-tree="height:13; trunkColor:#160c06; leafColor:#0a1606; leafSize:5.5"></a-entity>
  <a-entity position="15  0 -6"  jungle-tree="height:11; trunkColor:#1c1008; leafColor:#0e1c08; leafSize:5"></a-entity>
  <a-entity position="16  0 -16" jungle-tree="height:15; trunkColor:#120a04; leafColor:#081406; leafSize:6"></a-entity>
  <!-- Far background tree wall -->
  <a-entity position="-4  0 -24" jungle-tree="height:15; trunkColor:#120a04; leafColor:#081406; leafSize:6.5"></a-entity>
  <a-entity position="0   0 -26" jungle-tree="height:16; trunkColor:#0e0804; leafColor:#061204; leafSize:7"></a-entity>
  <a-entity position="4   0 -24" jungle-tree="height:14; trunkColor:#160c06; leafColor:#0a1606; leafSize:6"></a-entity>
  <a-entity position="-9  0 -26" jungle-tree="height:15; trunkColor:#0e0804; leafColor:#061204; leafSize:7"></a-entity>
  <a-entity position="9   0 -26" jungle-tree="height:15; trunkColor:#0e0804; leafColor:#061204; leafSize:7"></a-entity>

  <!-- ═══════════════════════════════════════════════════════════
       TREES — MEDIUM CANOPY  (height 7-10)  ~12 trees
  ═══════════════════════════════════════════════════════════════ -->
  <a-entity position="-5  0 -4"  jungle-tree="height:8;  trunkColor:#1c1008; leafColor:#121e0e; leafSize:3.8"></a-entity>
  <a-entity position="5   0 -4"  jungle-tree="height:9;  trunkColor:#181008; leafColor:#101c0c; leafSize:4"></a-entity>
  <a-entity position="-8  0 -7"  jungle-tree="height:8;  trunkColor:#1c1008; leafColor:#121e0e; leafSize:3.5"></a-entity>
  <a-entity position="7   0 -5"  jungle-tree="height:9;  trunkColor:#1c1008; leafColor:#101c0c; leafSize:4"></a-entity>
  <a-entity position="-3  0 -19" jungle-tree="height:10; trunkColor:#181008; leafColor:#0c1a09; leafSize:4.5"></a-entity>
  <a-entity position="3   0 -20" jungle-tree="height:9;  trunkColor:#160c06; leafColor:#0a1807; leafSize:4.2"></a-entity>
  <a-entity position="6   0 -17" jungle-tree="height:8;  trunkColor:#1c1008; leafColor:#0e1c08; leafSize:4"></a-entity>
  <a-entity position="-7  0 -20" jungle-tree="height:10; trunkColor:#120a04; leafColor:#081406; leafSize:4.5"></a-entity>
  <a-entity position="-2  0 -3"  jungle-tree="height:7;  trunkColor:#1c1008; leafColor:#121e0e; leafSize:3.2"></a-entity>
  <a-entity position="3   0 -3"  jungle-tree="height:8;  trunkColor:#181008; leafColor:#101c0c; leafSize:3.5"></a-entity>
  <!-- Spot 5 single tree — tempting but sparse underneath -->
  <a-entity id="spot5-tree" position="1 0 -6" jungle-tree="height:10; trunkColor:#221608; leafColor:#182810; leafSize:4.5"></a-entity>

  <!-- ═══════════════════════════════════════════════════════════
       TREES — UNDERSTORY  (height 3-6, twisted, close-branching)
  ═══════════════════════════════════════════════════════════════ -->
  <a-entity position="-4  0 -10" understory-tree="height:4;   trunkColor:#140a06; leafColor:#091608; leafSize:1.8"></a-entity>
  <a-entity position="-6  0 -8"  understory-tree="height:5;   trunkColor:#181008; leafColor:#0b1808; leafSize:2"></a-entity>
  <a-entity position="-9  0 -9"  understory-tree="height:3.5; trunkColor:#140a06; leafColor:#091608; leafSize:1.5"></a-entity>
  <a-entity position="2   0 -10" understory-tree="height:4.5; trunkColor:#181008; leafColor:#0c1a09; leafSize:2"></a-entity>
  <a-entity position="4   0 -15" understory-tree="height:5;   trunkColor:#140a06; leafColor:#0b1808; leafSize:2.2"></a-entity>
  <a-entity position="-2  0 -15" understory-tree="height:4;   trunkColor:#181008; leafColor:#091608; leafSize:1.8"></a-entity>
  <a-entity position="8   0 -14" understory-tree="height:3.5; trunkColor:#140a06; leafColor:#0b1808; leafSize:1.6"></a-entity>
  <a-entity position="-11 0 -8"  understory-tree="height:5;   trunkColor:#100806; leafColor:#071408; leafSize:2.2"></a-entity>
  <a-entity position="12  0 -5"  understory-tree="height:4;   trunkColor:#181008; leafColor:#091608; leafSize:1.8"></a-entity>
  <a-entity position="-3  0 -5"  understory-tree="height:3;   trunkColor:#1c1008; leafColor:#0e1c08; leafSize:1.4"></a-entity>
  <a-entity position="5   0 -9"  understory-tree="height:4;   trunkColor:#140a06; leafColor:#091608; leafSize:1.7"></a-entity>
  <a-entity position="-8  0 -3"  understory-tree="height:3.5; trunkColor:#181008; leafColor:#0b1808; leafSize:1.5"></a-entity>

  <!-- ═══ Hanging moss on large trunks ═══ -->
  <a-entity position="-10 7.5 -12" hanging-moss="length:2.2; count:7"></a-entity>
  <a-entity position="-5  6   -14" hanging-moss="length:1.8; count:5"></a-entity>
  <a-entity position="10  7   -8"  hanging-moss="length:2.5; count:6"></a-entity>
  <a-entity position="-15 8   -10" hanging-moss="length:1.6; count:5"></a-entity>
  <a-entity position="13  8   -12" hanging-moss="length:2;   count:6"></a-entity>

  <!-- ═══ Bamboo patches ═══ -->
  <a-entity bamboo-grove="count:10; spread:2;   baseX:-1; baseZ:-18"></a-entity>
  <a-entity bamboo-grove="count:8;  spread:1.8; baseX:5;  baseZ:-20"></a-entity>

  <!-- ════════════════════════════════════════════════════════════
       HIDING SPOT 1 — Dense Understory Vegetation  (score 5/5)
       Deep shadowed corner under large canopy trees
       Position: (-7, 0, -13)
  ════════════════════════════════════════════════════════════════ -->
  <a-entity id="spot1"
    hiding-spot="score:5; label:Dense Undergrowth; radius:2; spotId:1"
    position="-7 0 -13">
    <!-- Score ring: bright green = best hiding spot -->
    <a-torus radius="2.0" radius-tubular="0.06"
      rotation="90 0 0" position="0 0.05 0"
      color="#22ff44"
      material="opacity:0.55; transparent:true; shader:flat; emissive:#22ff44; emissiveIntensity:0.5"
      segments-radial="32" segments-tubular="8">
    </a-torus>
    <a-text value="Dense Undergrowth" align="center" color="#22ff44"
      width="3.5" position="0 0.6 0" look-at="#player-camera"
      material="shader:flat">
    </a-text>
    <!-- Layered dark bushes -->
    <a-entity bush-patch="size:2.6; color:#060e06"></a-entity>
    <a-entity position=" 0.9 0 -0.5" bush-patch="size:2.1; color:#040c06"></a-entity>
    <a-entity position="-0.8 0  0.8" bush-patch="size:1.9; color:#071208"></a-entity>
    <a-entity position=" 0   0  1.3" bush-patch="size:2.3; color:#060e06"></a-entity>
    <a-entity position="-1.1 0 -1.0" bush-patch="size:1.6; color:#040c06"></a-entity>
    <!-- Low fern layer -->
    <a-entity ground-cover="count:28; spread:2.3; color:#0c2810; size:0.45"></a-entity>
    <!-- Overhead canopy simulation: dark occluding planes -->
    <a-plane position=" 0   2.3  0"   rotation="-90 18 0"  width="4.2" height="4.2" color="#030804" material="opacity:0.78; transparent:true; side:double"></a-plane>
    <a-plane position=" 0.6 2.7  0.4" rotation="-90 -12 0" width="3.2" height="3"   color="#020604" material="opacity:0.62; transparent:true; side:double"></a-plane>
    <!-- Glow indicator — warm green, score 5 = brightest -->
    <a-sphere class="spot-glow" radius="2"   position="0 0.5 0"
      color="#2a5a1a" material="opacity:0; transparent:true; side:double; shader:flat"></a-sphere>
  </a-entity>

  <!-- ════════════════════════════════════════════════════════════
       RIVER — winding dark water through the scene
       Path: upper-left to right-mid
  ════════════════════════════════════════════════════════════════ -->
  <a-plane position="-1.8 0.03 -22"   rotation="-90  14 0" width="3"   height="5" color="#050c10" material="roughness:0.05; metalness:0.55; opacity:0.93; transparent:true"></a-plane>
  <a-plane position=" 0.3 0.03 -19"   rotation="-90   9 0" width="3"   height="5" color="#070e12" material="roughness:0.05; metalness:0.55; opacity:0.93; transparent:true"></a-plane>
  <a-plane position=" 2.0 0.03 -16.5" rotation="-90   3 0" width="3"   height="5" color="#050c10" material="roughness:0.05; metalness:0.55; opacity:0.93; transparent:true"></a-plane>
  <a-plane position=" 3.2 0.03 -14"   rotation="-90  -4 0" width="3"   height="5" color="#070e12" material="roughness:0.05; metalness:0.55; opacity:0.93; transparent:true"></a-plane>
  <a-plane position=" 4.2 0.03 -11.5" rotation="-90 -11 0" width="3"   height="5" color="#050c10" material="roughness:0.05; metalness:0.55; opacity:0.93; transparent:true"></a-plane>
  <a-plane position=" 5.5 0.03 -9.5"  rotation="-90 -19 0" width="3"   height="5" color="#070e12" material="roughness:0.05; metalness:0.55; opacity:0.93; transparent:true"></a-plane>
  <!-- Shimmer overlay — opacity animated via water-shimmer tick component, no TWEEN -->
  <a-plane id="river-shimmer" position="3.2 0.038 -14" rotation="-90 -4 0" width="3.1" height="5.1"
    color="#0a1c28" material="roughness:0; metalness:0.9; opacity:0.22; transparent:true"
    water-shimmer>
  </a-plane>

  <!-- ════════════════════════════════════════════════════════════
       HIDING SPOT 2 — Riparian Vegetation / River Bank  (score 4/5)
       Dense reeds, willows, tall grasses along river
       Position: (3.5, 0, -14)
  ════════════════════════════════════════════════════════════════ -->
  <a-entity id="spot2"
    hiding-spot="score:4; label:River Bank; radius:2.2; spotId:2"
    position="3.5 0 -14">
    <!-- Score ring: lime green = good hiding spot -->
    <a-torus radius="2.2" radius-tubular="0.06"
      rotation="90 0 0" position="0 0.05 0"
      color="#88ee22"
      material="opacity:0.55; transparent:true; shader:flat; emissive:#88ee22; emissiveIntensity:0.5"
      segments-radial="32" segments-tubular="8">
    </a-torus>
    <a-text value="River Bank" align="center" color="#88ee22"
      width="3.5" position="0 0.6 0" look-at="#player-camera"
      material="shader:flat">
    </a-text>
    <!-- Dense reeds -->
    <a-entity reed-patch="count:22; spread:1.9; color:#153a12"></a-entity>
    <!-- Willow-like drooping plants -->
    <a-entity position=" 0.7 0  0.6"  willow-plant="height:3;   spread:2"></a-entity>
    <a-entity position="-0.9 0 -0.8"  willow-plant="height:2.5; spread:1.8"></a-entity>
    <a-entity position=" 1.3 0 -0.9"  willow-plant="height:2.2; spread:1.5"></a-entity>
    <!-- Tall grasses -->
    <a-entity ground-cover="count:24; spread:2.1; color:#1e4c16; size:0.68"></a-entity>
    <!-- Dense bank shrubs -->
    <a-entity position="-1.1 0  0.6"  bush-patch="size:1.4; color:#0b1e0e"></a-entity>
    <a-entity position=" 1.0 0 -1.1"  bush-patch="size:1.3; color:#0d2210"></a-entity>
    <!-- Glow indicator — teal-green -->
    <a-sphere class="spot-glow" radius="2.2" position="0 0.5 0"
      color="#0e2a22" material="opacity:0; transparent:true; side:double; shader:flat"></a-sphere>
  </a-entity>

  <!-- ════════════════════════════════════════════════════════════
       HIDING SPOT 3 — Rocky Gully / Boulder Field  (score 3/5)
       Cluster of large dark boulders on right side
       Position: (9, 0, -10)
  ════════════════════════════════════════════════════════════════ -->
  <a-entity id="spot3"
    hiding-spot="score:3; label:Rocky Gully; radius:2.2; spotId:3"
    position="9 0 -10">
    <!-- Score ring: yellow = risky hiding spot -->
    <a-torus radius="2.2" radius-tubular="0.06"
      rotation="90 0 0" position="0 0.05 0"
      color="#ffdd22"
      material="opacity:0.55; transparent:true; shader:flat; emissive:#ffdd22; emissiveIntensity:0.5"
      segments-radial="32" segments-tubular="8">
    </a-torus>
    <a-text value="Rocky Gully" align="center" color="#ffdd22"
      width="3.5" position="0 0.6 0" look-at="#player-camera"
      material="shader:flat">
    </a-text>
    <!-- Large boulders in cluster with natural gaps -->
    <a-sphere radius="1.1"  color="#1c1c16" material="roughness:1" position=" 0    0.7   0"    scale="1.3 0.95 1.1" cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.9"  color="#181810" material="roughness:1" position=" 1.5  0.6   0.5"  scale="1.1 0.9  1.2" cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.72" color="#202018" material="roughness:1" position="-1.3  0.5   0.7"  scale="1.2 0.85 1"   cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.85" color="#1c1c16" material="roughness:1" position="-0.7  0.52 -1.1"  scale="1.3 0.9  1"   cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.65" color="#181810" material="roughness:1" position=" 2    0.44 -0.5"  scale="1.1 0.85 1.1" cast-shadow receive-shadow></a-sphere>
    <a-sphere radius="0.5"  color="#202018" material="roughness:1" position=" 0.5  0.34  1.5"  scale="1   0.8  1.3" cast-shadow receive-shadow></a-sphere>
    <!-- Loose small stones -->
    <a-sphere radius="0.22" color="#262620" material="roughness:1" position=" 0.9 0.14  1.9"></a-sphere>
    <a-sphere radius="0.18" color="#222218" material="roughness:1" position="-1.6 0.12  0.3"></a-sphere>
    <a-sphere radius="0.27" color="#242420" material="roughness:1" position=" 1.8 0.17  1.3"></a-sphere>
    <a-sphere radius="0.15" color="#262620" material="roughness:1" position="-0.5 0.11 -1.6"></a-sphere>
    <!-- Scrubby plants between rocks -->
    <a-entity ground-cover="count:12; spread:1.9; color:#142c0e; size:0.3"></a-entity>
    <!-- Gully shadow floor -->
    <a-plane position="0 0.012 0" rotation="-90 20 0" width="4.5" height="3.5"
      color="#0a0a07" material="opacity:0.52; transparent:true"></a-plane>
    <!-- Glow indicator — amber-grey, score 3 -->
    <a-sphere class="spot-glow" radius="2.2" position="0 0.5 0"
      color="#1e1e0e" material="opacity:0; transparent:true; side:double; shader:flat"></a-sphere>

<!-- ═══════════════════════════════════════════════════════════════
     COMPONENTS & GAME LOGIC
═══════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ═══ UTILITIES ═══════════════════════════════════════════════════ */
function rnd(min, max) { return min + Math.random() * (max - min); }

/* ═══ GAME STATE ══════════════════════════════════════════════════ */
const HIDE_DURATION = 120;

const GameState = {
  phase: 'hide',            // 'hide' | 'leopard' | 'result'
  timeLeft: HIDE_DURATION,
  deerPosition:     { x: 0, y: 0, z: -1.2 },
  deerHidingScore:  null,   // 1-5 or null
  deerHidingSpotId: null,   // 1-5 or null
  deerHeld:         false   // true while player is carrying the deer
};

/* ═══ AUDIO SYSTEM ════════════════════════════════════════════════ */
let _audio = null;

function initAudio() {
  if (_audio) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();

    // ── Forest ambient: bandpass-filtered white noise ──
    const fBuf = ctx.createBuffer(1, ctx.sampleRate * 3, ctx.sampleRate);
    const fD   = fBuf.getChannelData(0);
    for (let i = 0; i < fD.length; i++) fD[i] = Math.random() * 2 - 1;
    const fSrc = ctx.createBufferSource();
    fSrc.buffer = fBuf; fSrc.loop = true;
    const fFilt = ctx.createBiquadFilter();
    fFilt.type = 'bandpass'; fFilt.frequency.value = 550; fFilt.Q.value = 0.4;
    const fGain = ctx.createGain(); fGain.gain.value = 0.06;
    fSrc.connect(fFilt); fFilt.connect(fGain); fGain.connect(ctx.destination);
    fSrc.start();

    // ── River: low-pass white noise ──
    const rBuf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const rD   = rBuf.getChannelData(0);
    for (let i = 0; i < rD.length; i++) rD[i] = Math.random() * 2 - 1;
    const rSrc = ctx.createBufferSource();
    rSrc.buffer = rBuf; rSrc.loop = true;
    const rFilt = ctx.createBiquadFilter();
    rFilt.type = 'lowpass'; rFilt.frequency.value = 320;
    const rGain = ctx.createGain(); rGain.gain.value = 0.09;
    rSrc.connect(rFilt); rFilt.connect(rGain); rGain.connect(ctx.destination);
    rSrc.start();

    // ── Bird calls: periodic chirps ──
    function scheduleBird() {
      const delay = rnd(4500, 10000);
      setTimeout(() => {
        if (!_audio) return;
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        const f = rnd(1300, 3400);
        osc.frequency.setValueAtTime(f, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(f * rnd(0.7, 1.35), ctx.currentTime + 0.13);
        g.gain.setValueAtTime(0.11, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + rnd(0.1, 0.4));
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.55);
        scheduleBird();
      }, delay);
    }
    scheduleBird();

    _audio = { ctx, fGain, rGain };
  } catch(e) { console.warn('[Audio] Web Audio init failed:', e); }
}

function startTensionRumble() {
  if (!_audio || _audio._rumble) return;
  const { ctx } = _audio;
  const osc  = ctx.createOscillator();
  osc.type = 'sine'; osc.frequency.value = 36;
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.16, ctx.currentTime + 5);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start();
  _audio._rumble = { osc, gain };
}

function startLeopardGrowl() {
  if (!_audio) return;
  const { ctx } = _audio;
  const osc    = ctx.createOscillator();
  osc.type = 'sawtooth'; osc.frequency.value = 52;
  const filt   = ctx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 105;
  const gain   = ctx.createGain();
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(0.18, ctx.currentTime + 3);
  // Growl LFO modulation
  const lfo    = ctx.createOscillator();
  lfo.frequency.value = 1.9;
  const lfoG   = ctx.createGain();
  lfoG.gain.value = 16;
  lfo.connect(lfoG); lfoG.connect(osc.frequency);
  lfo.start();
  osc.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
  osc.start();
  _audio._growl = { osc, gain };
}

/* ═══ UI HELPERS ══════════════════════════════════════════════════ */
function formatTime(s) {
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}
function updateTimerUI(s) {
  const h = document.getElementById('timer-display');
  const v = document.getElementById('vr-timer');
  const str = formatTime(s);
  if (h) h.textContent = str;
  if (v) v.setAttribute('value', str);
}
function setPhaseLabel(text) {
  const h = document.getElementById('phase-label');
  const v = document.getElementById('vr-phase');
  if (h) h.textContent = text;
  if (v) v.setAttribute('value', text);
}

function showResult(outcome, score) {
  const spotName  = GameState.deerHidingSpotId
    ? (document.getElementById('spot' + GameState.deerHidingSpotId)
        ?.components?.['hiding-spot']?.data?.label || 'Unknown spot')
    : 'No hiding spot';
  const scoreStr  = score > 0 ? `Score: ${score}/5 — ${spotName}` : 'Not hidden in any spot';
  let text, color, bg;
  if (outcome === 'survived-well') {
    text  = `Safe!\nThe leopard didn't find the deer.\n${scoreStr}`;
    color = '#44ff88'; bg = '#061a0a';
    setPhaseLabel('Safe! The deer survived!');
  } else {
    text  = `The deer was found!\nThe leopard detected it.\n${scoreStr}`;
    color = '#ff5544'; bg = '#180808';
    setPhaseLabel('The deer was found!');
  }
  document.getElementById('result-bg').setAttribute('color', bg);
  document.getElementById('result-text').setAttribute('value', text);
  document.getElementById('result-text').setAttribute('color', color);
  document.getElementById('result-panel').setAttribute('visible', true);
}

/* ═══ CAMOUFLAGE ══════════════════════════════════════════════════
   Traverse the deer's mesh and adjust opacity by score.
   Score 5 (best spot) = nearly invisible; score 1 = fully visible.
═══════════════════════════════════════════════════════════════ */
const CAMO_OPACITY = { 5: 0.28, 4: 0.50, 3: 0.72, 2: 0.88, 1: 1.0, 0: 1.0 };

function setCamouflage(score) {
  const deer = document.getElementById('the-deer');
  if (!deer) return;
  const opacity = CAMO_OPACITY[score] ?? 1.0;
  deer.object3D.traverse(child => {
    if (!child.isMesh) return;
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.forEach(m => {
      m.transparent = opacity < 1.0;
      m.opacity     = opacity;
      m.needsUpdate = true;
    });
  });
}

/* ═══ HIDING SPOT DETECTION ═══════════════════════════════════════
   After deer is dropped, find nearest hiding spot within its radius.
═══════════════════════════════════════════════════════════════ */
function checkHidingSpot(worldPos) {
  let best = null, bestDist = Infinity;
  document.querySelectorAll('[hiding-spot]').forEach(el => {
    const comp = el.components['hiding-spot'];
    if (!comp) return;
    const sp = new THREE.Vector3();
    el.object3D.getWorldPosition(sp);
    const d = worldPos.distanceTo(sp);
    if (d < comp.data.radius && d < bestDist) {
      bestDist = d; best = comp;
    }
  });
  return best;
}

/* ═══ PLACEMENT FEEDBACK ══════════════════════════════════════════ */
function showPlaceFeedback(label, score) {
  const msgs   = { 5:'Perfect cover!', 4:'Good spot!', 3:'Risky cover', 2:'Poor cover!', 1:'Barely hidden!' };
  const colors = { 5:'#44ff88', 4:'#88ee66', 3:'#ffcc44', 2:'#ff8844', 1:'#ff5544' };
  const dp = GameState.deerPosition;
  const msg = document.createElement('a-text');
  msg.setAttribute('value', `${label}\n${msgs[score]||''}`);
  msg.setAttribute('color', colors[score] || '#ffffff');
  msg.setAttribute('align', 'center');
  msg.setAttribute('width', '2.8');
  msg.setAttribute('position', `${dp.x} 1.85 ${dp.z}`);
  msg.setAttribute('look-at', '#player-camera');
  document.querySelector('a-scene').appendChild(msg);
  setTimeout(() => msg.parentNode && msg.parentNode.removeChild(msg), 3200);
}

/* ════════════════════════════════════════════════════════════════
   JUNGLE TREE — dark tropical canopy
════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('jungle-tree', {
  schema: {
    height:     { type:'number', default:8 },
    trunkColor: { type:'color',  default:'#1c1008' },
    leafColor:  { type:'color',  default:'#0e1c08' },
    leafSize:   { type:'number', default:3.5 }
  },
  init() {
    const { height:h, trunkColor, leafColor, leafSize:ls } = this.data;
    const tr = rnd(0.18, 0.30);

    // Trunk
    const trunk = document.createElement('a-cylinder');
    trunk.setAttribute('radius', tr);
    trunk.setAttribute('height', h);
    trunk.setAttribute('position', `0 ${h/2} 0`);
    trunk.setAttribute('color', trunkColor);
    trunk.setAttribute('material', 'roughness:1; metalness:0');
    trunk.setAttribute('cast-shadow', '');
    this.el.appendChild(trunk);

    // Main canopy — low-poly sphere
    const main = document.createElement('a-sphere');
    main.setAttribute('radius', ls);
    main.setAttribute('position', `0 ${h + ls * 0.55} 0`);
    main.setAttribute('color', leafColor);
    main.setAttribute('material', 'roughness:1; metalness:0');
    main.setAttribute('segments-width', 8);
    main.setAttribute('segments-height', 6);
    main.setAttribute('cast-shadow', '');
    this.el.appendChild(main);

    // Secondary canopy blobs for irregular silhouette
    [[rnd(-1.4,1.4), rnd(-0.6,0.4), rnd(-1.4,1.4)],
     [rnd(-1.6,1.6), rnd(-0.9,0.2), rnd(-1.6,1.6)],
     [rnd(-1.0,1.0), rnd( 0.1,0.7), rnd(-1.0,1.0)]].forEach(([ox,oy,oz]) => {
      const blob = document.createElement('a-sphere');
      blob.setAttribute('radius', ls * rnd(0.5, 0.72));
      blob.setAttribute('position', `${ox} ${h + ls * 0.55 + oy} ${oz}`);

/* ════════════════════════════════════════════════════════════════
   WATER SHIMMER — oscillates river overlay opacity via sin, no TWEEN
════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('water-shimmer', {
  init() {
    this._t   = 0;
    this._mat = null;
  },
  tick(time, dt) {
    if (!this._mat) {
      const mesh = this.el.getObject3D('mesh');
      if (!mesh) return;
      this._mat = mesh.material;
    }
    this._t += dt * 0.001;
    // Smoothly oscillate opacity 0.10 → 0.38 using sin — no easing library
    this._mat.opacity = 0.10 + (Math.sin(this._t * 1.4) * 0.5 + 0.5) * 0.28;
    this._mat.needsUpdate = true;
  }
});

/* ════════════════════════════════════════════════════════════════
   HIDING SPOT
   — glows when player controller / head comes within 3.5 m
   — activate() / deactivate() called by grabber on drop
════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('hiding-spot', {
  schema: {
    score:  { type:'number', default:1 },
    label:  { type:'string', default:'Hiding Spot' },
    radius: { type:'number', default:1.5 },
    spotId: { type:'number', default:0 }
  },
  init() {
    this._sPos  = new THREE.Vector3();
    this._ePos  = new THREE.Vector3();
    this._glow  = null;
    this._prevOp = -1;
  },
  _getGlow() {
    if (!this._glow) this._glow = this.el.querySelector('.spot-glow');
    return this._glow;
  },
  activate(score) {
    GameState.deerHidingScore  = score;
    GameState.deerHidingSpotId = this.data.spotId;
    const g = this._getGlow();
    if (g) g.setAttribute('material', 'opacity:0.20; transparent:true; side:double; shader:flat');
    console.log(`[Spot ${this.data.spotId}] Deer placed — ${this.data.label} (score ${score})`);
  },
  deactivate() {
    GameState.deerHidingScore  = null;
    GameState.deerHidingSpotId = null;
    const g = this._getGlow();
    if (g) g.setAttribute('material', 'opacity:0; transparent:true; side:double; shader:flat');
  },
  tick(time) {
    const g = this._getGlow();
    if (!g) return;

    // Always pulse gently so player can find spots (even before approaching)
    const basePulse = 0.12 + Math.sin(time * 0.002) * 0.06;

    if (GameState.phase !== 'hide') {
      // Keep a static glow after hide phase ends
      if (this._prevOp !== 0.12) {
        this._prevOp = 0.12;
        g.setAttribute('material', 'opacity:0.12; transparent:true; side:double; shader:flat');
      }
      return;
    }

    this.el.object3D.getWorldPosition(this._sPos);
    let minDist = Infinity;
    ['left-controller', 'right-controller', 'player-camera'].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.object3D.getWorldPosition(this._ePos);
      const d = this._ePos.distanceTo(this._sPos);
      if (d < minDist) minDist = d;
    });

    const DIST = 5;
    const proximityBoost = minDist < DIST
      ? (1 - minDist / DIST) * 0.55
      : 0;
    const op = parseFloat(Math.max(basePulse, proximityBoost).toFixed(3));

    if (Math.abs(op - this._prevOp) > 0.005) {
      this._prevOp = op;
      g.setAttribute('material', `opacity:${op}; transparent:true; side:double; shader:flat`);
    }
  }
});

/* ════════════════════════════════════════════════════════════════
   DEER IDLE ANIMATION
   Works with procedural geometry — no model-loaded event needed.
════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('deer-idle', {
  init() {
    this._t         = 0;
    this._grabbed   = false;
    this._baseScale = null;
    // Capture base scale on first tick (works for both GLTF and procedural)
  },
  setGrabbed(v) { this._grabbed = v; },
  tick(time, dt) {
    // Lazy-init base scale
    if (!this._baseScale) {
      this._baseScale = this.el.object3D.scale.clone();
      return;
    }
    if (this._grabbed) return;
    this._t += dt * 0.001;
    const b = 1 + Math.sin(this._t * 1.9) * 0.015;
    this.el.object3D.scale.set(
      this._baseScale.x * b,
      this._baseScale.y * b,
      this._baseScale.z * b
    );
    this.el.object3D.position.y = Math.sin(this._t * 1.2) * 0.008;
  }
});

/* ════════════════════════════════════════════════════════════════
   MOUSE GRAB HANDLER
   Click the deer to pick it up; it follows the camera at 1.5 m forward.
   Click again to release onto the ground and check the hiding spot.
════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('mouse-grab-handler', {
  init() {
    this._held  = false;
    this._onKey = (e) => { if (e.key === 'Enter' && this._held) this._release(); };
    this.el.addEventListener('click', this._onClick.bind(this));
    window.addEventListener('keydown', this._onKey);
  },
  remove() {
    window.removeEventListener('keydown', this._onKey);
  },
  _getDeer() { return document.getElementById('the-deer'); },
  _onClick() {
    if (GameState.phase !== 'hide') return;
    if (!this._held) this._grab();
  },
  _grab() {
    this._held = true;
    GameState.deerHeld = true;
    initAudio();
    const deer = this._getDeer();
    const hint = document.getElementById('deer-hint');
    if (hint) hint.setAttribute('visible', false);
    if (deer.components['deer-idle']) deer.components['deer-idle'].setGrabbed(true);
    if (GameState.deerHidingSpotId !== null) {
      const se = document.getElementById('spot' + GameState.deerHidingSpotId);
      if (se && se.components['hiding-spot']) se.components['hiding-spot'].deactivate();
    }
    setCamouflage(0);
  },
  _release() {
    this._held = false;
    GameState.deerHeld = false;
    const cam = document.getElementById('player-camera');
    const wp  = new THREE.Vector3();
    const dir = new THREE.Vector3();
    cam.object3D.getWorldPosition(wp);
    cam.object3D.getWorldDirection(dir);
    wp.x += dir.x * 1.5;
    wp.z += dir.z * 1.5;
    wp.y = 0;
    const deer = this._getDeer();
    deer.setAttribute('position', { x: wp.x, y: 0, z: wp.z });
    if (deer.components['deer-idle']) deer.components['deer-idle'].setGrabbed(false);
    const hint = document.getElementById('deer-hint');
    if (hint) hint.setAttribute('visible', true);
    const spotComp = checkHidingSpot(wp);
    if (spotComp) {
      spotComp.activate(spotComp.data.score);
      setCamouflage(spotComp.data.score);
      showPlaceFeedback(spotComp.data.label, spotComp.data.score);
    } else {
      GameState.deerHidingScore  = 0;
      GameState.deerHidingSpotId = null;
      setCamouflage(0);
    }
    GameState.deerPosition = { x: wp.x, y: 0, z: wp.z };
  },
  tick(time, dt) {
    if (!this._held) return;
    // Move deer to 1.5 m in front of camera on ground plane
    const cam = document.getElementById('player-camera');
    if (!cam) return;
    const wp  = new THREE.Vector3();
    const dir = new THREE.Vector3();
    cam.object3D.getWorldPosition(wp);
    cam.object3D.getWorldDirection(dir);
    const deer = this._getDeer();
    deer.object3D.position.set(wp.x + dir.x * 1.5, 0, wp.z + dir.z * 1.5);
  }
});

/* ════════════════════════════════════════════════════════════════
   GRABBER
   Quest 2 GRIP button grabs deer when within 0.95 m.
   On release: snap to floor, check hiding spot, apply camouflage.
════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('grabber', {
  schema: { hand: { type:'string', default:'right' } },
  init() {
    this._holding    = null;
    this._prevParent = null;
    this._offset     = new THREE.Vector3();
    this.el.addEventListener('gripdown',    this._onDown.bind(this));
    this.el.addEventListener('gripup',      this._onUp.bind(this));
    this.el.addEventListener('triggerdown', this._onDown.bind(this));
    this.el.addEventListener('triggerup',   this._onUp.bind(this));
    // Start audio on first controller press
    this.el.addEventListener('gripdown',    initAudio, { once: true });
    this.el.addEventListener('triggerdown', initAudio, { once: true });
  },
  _onDown() {
    if (GameState.phase !== 'hide') return;
    if (this._holding) return;
    const deer = document.getElementById('the-deer');
    if (!deer) return;
    const cp = new THREE.Vector3(), dp = new THREE.Vector3();
    this.el.object3D.getWorldPosition(cp);
    deer.object3D.getWorldPosition(dp);
    // Check against deer's visual centre (~0.5 m above root) with generous radius
    dp.y += 0.5;
    if (cp.distanceTo(dp) > 1.5) return;

    this._holding = deer;
    const hint = document.getElementById('deer-hint');
    if (hint) hint.setAttribute('visible', false);
    if (deer.components['deer-idle']) deer.components['deer-idle'].setGrabbed(true);

    // Deactivate hiding spot if deer was already there
    if (GameState.deerHidingSpotId !== null) {
      const se = document.getElementById(`spot${GameState.deerHidingSpotId}`);
      if (se && se.components['hiding-spot']) se.components['hiding-spot'].deactivate();
    }
    setCamouflage(0);

    // Grab offset in controller local space
    this.el.object3D.updateMatrixWorld();
    const inv = new THREE.Matrix4().copy(this.el.object3D.matrixWorld).invert();
    deer.object3D.getWorldPosition(dp);
    this._offset.copy(dp).applyMatrix4(inv);
    this._prevParent = deer.parentNode;
    this.el.appendChild(deer);
    deer.object3D.position.copy(this._offset);
  },
  _onUp() {
    if (!this._holding) return;
    const deer = this._holding;
    this._holding = null;
    const wp = new THREE.Vector3(), wq = new THREE.Quaternion();
    deer.object3D.getWorldPosition(wp);
    deer.object3D.getWorldQuaternion(wq);
    // Reparent to scene root
    document.querySelector('a-scene').appendChild(deer);
    wp.y = 0;
    deer.setAttribute('position', { x: wp.x, y: 0, z: wp.z });
    deer.object3D.quaternion.copy(wq);
    if (deer.components['deer-idle']) deer.components['deer-idle'].setGrabbed(false);
    const hint = document.getElementById('deer-hint');
    if (hint) hint.setAttribute('visible', true);
    // Hiding spot check
    const spotComp = checkHidingSpot(wp);
    if (spotComp) {
      spotComp.activate(spotComp.data.score);
      setCamouflage(spotComp.data.score);
      showPlaceFeedback(spotComp.data.label, spotComp.data.score);
    } else {
      GameState.deerHidingScore  = 0;
      GameState.deerHidingSpotId = null;
      setCamouflage(0);
    }
    GameState.deerPosition = { x: wp.x, y: 0, z: wp.z };
    console.log(`[Grabber:${this.data.hand}] Released deer at`, GameState.deerPosition);
  }
});

/* ════════════════════════════════════════════════════════════════
   LEOPARD PATROL
   Enters from the tree line (Z = -22), patrols worst → best spots.
   Patrol order: 5 (open) → 4 (corridor) → 3 (rocks) → 2 (river) → 1 (deep)
   If deer is at score ≤ 2 spot when leopard arrives → caught.
   Score 3 → hesitates, slows.  Score 4-5 → passes by.
════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('leopard-patrol', {
  init() {
    this._pacing = false;
    this._paceT  = 0;
    this._origin = new THREE.Vector3();
  },
  // spawnPos: {x, z} — next to deer or player
  // score: 0-5
  start(spawnPos, score) {
    this.el.setAttribute('position', `${spawnPos.x + 1.2} 0 ${spawnPos.z}`);
    this.el.setAttribute('visible', true);
    this._origin.set(spawnPos.x + 1.2, 0, spawnPos.z);
    this._pacing = true;
    this._paceT  = 0;
    startLeopardGrowl();

    // Decide outcome from score
    const safe = score >= 3;
    setTimeout(() => {
      GameState.phase = 'result';
      showResult(safe ? 'survived-well' : 'caught', score);
    }, 2500);
  },
  tick(time, dt) {
    if (!this._pacing) return;
    // Leopard paces back and forth around spawn point
    this._paceT += dt * 0.001;
    const ox = Math.sin(this._paceT * 1.6) * 0.8;
    const oz = Math.cos(this._paceT * 0.9) * 0.5;
    this.el.object3D.position.set(
      this._origin.x + ox,
      0,
      this._origin.z + oz
    );
    this.el.object3D.rotation.y = Math.atan2(ox, oz);
  }
});

/* ════════════════════════════════════════════════════════════════
   INTRO PANEL — auto-dismisses after 14 s
════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('intro-panel', {
  init() {
    setTimeout(() => this.el.setAttribute('visible', false), 14000);
  }
});

/* ════════════════════════════════════════════════════════════════
   GAME MANAGER — countdown, tension at 30 s, leopard trigger
════════════════════════════════════════════════════════════════ */
AFRAME.registerComponent('game-manager', {
  init() {
    this._lastSec  = null;
    this._tension  = false;
  },
  tick(time) {
    if (GameState.phase !== 'hide') return;
    const nowSec = Math.floor(time / 1000);
    if (this._lastSec === nowSec) return;
    this._lastSec = nowSec;

    const rem = Math.max(0, HIDE_DURATION - nowSec);
    GameState.timeLeft = rem;
    updateTimerUI(rem);

    // ── Tension at 30 s ──
    if (rem <= 30 && !this._tension) {
      this._tension = true;
      setPhaseLabel('Something is approaching...');
      // Darken ambient light slightly
      const al = document.getElementById('ambient-light');
      if (al) al.setAttribute('light', 'intensity:0.85; color:#6a8850');
      // Slightly denser fog — still visible but more ominous
      document.querySelector('a-scene').setAttribute('fog',
        'type:exponential; color:#3a5a28; density:0.030');
      startTensionRumble();
    }

    // ── Flash timer in final 10 s ──
    if (rem <= 10 && rem > 0) {
      const vt = document.getElementById('vr-timer');
      if (vt) vt.setAttribute('color', rem % 2 === 0 ? '#ff4444' : '#ffe080');
      const ov = document.getElementById('ui-overlay');
      if (ov) ov.className = rem % 2 === 0 ? 'urgent' : '';
    }

    // ── Timer expired ──
    if (rem === 0) {
      GameState.phase = 'leopard';
      setPhaseLabel('The leopard is here!');
      updateTimerUI(0);
      const ov = document.getElementById('ui-overlay');
      if (ov) ov.className = 'urgent';
      const hint = document.getElementById('deer-hint');
      if (hint) hint.setAttribute('visible', false);
      // Determine spawn position: next to deer if placed, else next to player
      const score = GameState.deerHidingScore || 0;
      let spawnPos;
      if (GameState.deerHeld) {
        // Deer still being carried — spawn next to player
        const cam = document.getElementById('player-camera');
        const cp  = new THREE.Vector3();
        cam.object3D.getWorldPosition(cp);
        spawnPos = { x: cp.x, z: cp.z };
      } else {
        spawnPos = { x: GameState.deerPosition.x, z: GameState.deerPosition.z };
      }
      setTimeout(() => {
        const leo = document.getElementById('the-leopard');
        if (leo && leo.components['leopard-patrol'])
          leo.components['leopard-patrol'].start(spawnPos, score);
      }, 2500);
    }
  }
});

// Attach game manager
document.querySelector('a-scene').setAttribute('game-manager', '');

// Start audio on XR entry (Quest 2 requires user gesture)
document.querySelector('a-scene').addEventListener('enter-vr', () => {
  setTimeout(initAudio, 400);
});
</script>
